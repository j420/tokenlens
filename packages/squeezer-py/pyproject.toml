[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "prune-squeezer"
version = "0.1.0"
description = "Telegraphic Semantic Code Squeezer for LLM Context Compression"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [
    {name = "Prune", email = "hello@delimit.dev"}
]
keywords = ["llm", "compression", "code", "tree-sitter", "semantic"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Compilers",
    "Topic :: Text Processing :: Filters",
]

dependencies = [
    "tree-sitter>=0.21.0",
    "tree-sitter-python>=0.21.0",
    "tree-sitter-javascript>=0.21.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "black>=23.0",
    "mypy>=1.0",
]

[project.scripts]
squeeze = "semantic_squeezer:cli"
prune-squeeze = "semantic_squeezer:cli"

[project.urls]
Homepage = "https://github.com/delimit-dev/prune"
Documentation = "https://delimit.dev/docs"
Repository = "https://github.com/delimit-dev/prune"

[tool.setuptools]
py-modules = ["semantic_squeezer"]

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
