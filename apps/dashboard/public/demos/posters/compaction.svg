<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#18181b"/>

  <!-- Title -->
  <text x="640" y="60" font-family="system-ui" font-size="20" font-weight="600" fill="#f59e0b" text-anchor="middle">COMPACTION RECOVERY</text>
  <text x="640" y="85" font-family="system-ui" font-size="14" fill="#a1a1aa" text-anchor="middle">Decisions at risk of being forgotten</text>

  <!-- Warning icon -->
  <circle cx="100" cy="75" r="20" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="100" y="82" font-family="system-ui" font-size="20" fill="#f59e0b" text-anchor="middle">!</text>

  <!-- Decision cards -->
  <rect x="140" y="130" width="480" height="100" rx="12" fill="#27272a" stroke="#f59e0b" stroke-width="2"/>
  <rect x="160" y="150" width="40" height="40" rx="8" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="180" y="178" font-family="system-ui" font-size="20" fill="#f59e0b" text-anchor="middle">1</text>
  <text x="220" y="170" font-family="system-ui" font-size="15" font-weight="600" fill="#fafafa">JWT expiry set to 15 min</text>
  <text x="220" y="195" font-family="system-ui" font-size="12" fill="#71717a">Turn 4, configuration</text>
  <rect x="500" y="155" width="100" height="24" rx="4" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="550" y="172" font-family="system-ui" font-size="11" fill="#f59e0b" text-anchor="middle">At Risk</text>

  <rect x="140" y="250" width="480" height="100" rx="12" fill="#27272a" stroke="#f59e0b" stroke-width="2"/>
  <rect x="160" y="270" width="40" height="40" rx="8" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="180" y="298" font-family="system-ui" font-size="20" fill="#f59e0b" text-anchor="middle">2</text>
  <text x="220" y="290" font-family="system-ui" font-size="15" font-weight="600" fill="#fafafa">Rate limiter runs BEFORE auth</text>
  <text x="220" y="315" font-family="system-ui" font-size="12" fill="#71717a">Turn 7, architectural</text>
  <rect x="500" y="275" width="100" height="24" rx="4" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="550" y="292" font-family="system-ui" font-size="11" fill="#f59e0b" text-anchor="middle">At Risk</text>

  <rect x="140" y="370" width="480" height="100" rx="12" fill="#27272a" stroke="#f59e0b" stroke-width="2"/>
  <rect x="160" y="390" width="40" height="40" rx="8" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="180" y="418" font-family="system-ui" font-size="20" fill="#f59e0b" text-anchor="middle">3</text>
  <text x="220" y="410" font-family="system-ui" font-size="15" font-weight="600" fill="#fafafa">Use bcrypt, not md5 for passwords</text>
  <text x="220" y="435" font-family="system-ui" font-size="12" fill="#71717a">Turn 2, requirement</text>
  <rect x="500" y="395" width="100" height="24" rx="4" fill="#ef4444" fill-opacity="0.2"/>
  <text x="550" y="412" font-family="system-ui" font-size="11" fill="#ef4444" text-anchor="middle">Critical</text>

  <!-- Recovery reminder panel -->
  <rect x="660" y="130" width="480" height="400" rx="12" fill="#27272a" stroke="#10b981" stroke-width="2"/>
  <rect x="660" y="130" width="480" height="50" rx="12" fill="#10b981" fill-opacity="0.1"/>
  <text x="900" y="162" font-family="system-ui" font-size="14" font-weight="600" fill="#10b981" text-anchor="middle">Copy this reminder to your next prompt</text>

  <rect x="690" y="200" width="420" height="280" rx="8" fill="#3f3f46"/>
  <text x="710" y="230" font-family="system-ui" font-size="13" fill="#fafafa">Remember these decisions:</text>
  <text x="730" y="265" font-family="system-ui" font-size="12" fill="#a1a1aa">• JWT expiry set to 15 min (turn 4)</text>
  <text x="730" y="295" font-family="system-ui" font-size="12" fill="#a1a1aa">• Rate limiter runs BEFORE auth (turn 7)</text>
  <text x="730" y="325" font-family="system-ui" font-size="12" fill="#a1a1aa">• Use bcrypt, not md5 (turn 2)</text>

  <!-- Copy button -->
  <rect x="750" y="420" width="300" height="40" rx="8" fill="#10b981"/>
  <text x="900" y="446" font-family="system-ui" font-size="14" font-weight="500" fill="#fafafa" text-anchor="middle">Copy to Clipboard</text>

  <!-- Context bar visualization -->
  <rect x="140" y="560" width="1000" height="60" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="160" y="585" font-family="system-ui" font-size="11" fill="#71717a">Context window:</text>
  <rect x="300" y="575" width="700" height="20" rx="4" fill="#3f3f46"/>
  <rect x="300" y="575" width="560" height="20" rx="4" fill="#f59e0b" fill-opacity="0.3"/>
  <rect x="860" y="575" width="140" height="20" rx="4" fill="#ef4444" fill-opacity="0.3"/>
  <text x="1020" y="590" font-family="system-ui" font-size="11" fill="#ef4444">Compacting...</text>

  <!-- Title -->
  <text x="640" y="680" font-family="system-ui" font-size="24" font-weight="600" fill="#fafafa" text-anchor="middle">Compaction Recovery - Never lose decisions</text>
</svg>
