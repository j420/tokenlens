<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#18181b"/>

  <!-- Timeline visualization -->
  <text x="640" y="80" font-family="system-ui" font-size="20" font-weight="600" fill="#fafafa" text-anchor="middle">Session Memory - Prevents Duplicate Reads</text>

  <!-- Turn 1 -->
  <rect x="100" y="140" width="500" height="120" rx="12" fill="#27272a" stroke="#3f3f46" stroke-width="2"/>
  <circle cx="140" cy="200" r="24" fill="#3f3f46"/>
  <text x="140" y="206" font-family="system-ui" font-size="14" font-weight="600" fill="#fafafa" text-anchor="middle">1</text>
  <text x="180" y="180" font-family="system-ui" font-size="14" font-weight="600" fill="#fafafa">Turn 1</text>
  <text x="180" y="205" font-family="system-ui" font-size="13" fill="#a1a1aa">User asks about auth.ts</text>
  <rect x="180" y="220" width="150" height="24" rx="4" fill="#10b981" fill-opacity="0.2"/>
  <text x="190" y="237" font-family="system-ui" font-size="12" fill="#10b981">AI reads auth.ts</text>
  <text x="530" y="237" font-family="system-ui" font-size="12" fill="#10b981" text-anchor="end">2,400 tokens</text>

  <!-- Timeline connector -->
  <line x1="350" y1="260" x2="350" y2="300" stroke="#3f3f46" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Turns 2-4 (condensed) -->
  <rect x="100" y="300" width="500" height="60" rx="12" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="350" y="338" font-family="system-ui" font-size="13" fill="#71717a" text-anchor="middle">Turns 2-4: Other operations...</text>

  <!-- Timeline connector -->
  <line x1="350" y1="360" x2="350" y2="400" stroke="#3f3f46" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Turn 5 - The duplicate prevention -->
  <rect x="100" y="400" width="500" height="140" rx="12" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="2"/>
  <circle cx="140" cy="470" r="24" fill="#10b981"/>
  <text x="140" y="476" font-family="system-ui" font-size="14" font-weight="600" fill="#fafafa" text-anchor="middle">5</text>
  <text x="180" y="440" font-family="system-ui" font-size="14" font-weight="600" fill="#fafafa">Turn 5</text>
  <text x="180" y="465" font-family="system-ui" font-size="13" fill="#a1a1aa">AI tries to read auth.ts again</text>

  <rect x="180" y="485" width="380" height="36" rx="6" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="370" y="508" font-family="system-ui" font-size="13" font-weight="500" fill="#10b981" text-anchor="middle">"Already in context from turn 1" - Skip read</text>

  <!-- Session memory panel -->
  <rect x="680" y="140" width="500" height="400" rx="12" fill="#27272a" stroke="#10b981" stroke-width="2"/>
  <rect x="680" y="140" width="500" height="50" rx="12" fill="#27272a"/>
  <text x="930" y="172" font-family="system-ui" font-size="16" font-weight="600" fill="#10b981" text-anchor="middle">Session Memory</text>

  <!-- Memory entries -->
  <rect x="710" y="210" width="440" height="50" rx="8" fill="#3f3f46"/>
  <text x="730" y="240" font-family="system-ui" font-size="13" fill="#fafafa">auth.ts</text>
  <text x="1100" y="240" font-family="system-ui" font-size="12" fill="#10b981" text-anchor="end">Turn 1</text>

  <rect x="710" y="270" width="440" height="50" rx="8" fill="#3f3f46"/>
  <text x="730" y="300" font-family="system-ui" font-size="13" fill="#fafafa">config.ts</text>
  <text x="1100" y="300" font-family="system-ui" font-size="12" fill="#a1a1aa" text-anchor="end">Turn 2</text>

  <rect x="710" y="330" width="440" height="50" rx="8" fill="#3f3f46"/>
  <text x="730" y="360" font-family="system-ui" font-size="13" fill="#fafafa">utils.ts</text>
  <text x="1100" y="360" font-family="system-ui" font-size="12" fill="#a1a1aa" text-anchor="end">Turn 3</text>

  <!-- Savings summary -->
  <rect x="710" y="420" width="440" height="80" rx="8" fill="#10b981" fill-opacity="0.15"/>
  <text x="930" y="455" font-family="system-ui" font-size="16" font-weight="600" fill="#10b981" text-anchor="middle">Session Savings: 15,000+ tokens</text>
  <text x="930" y="480" font-family="system-ui" font-size="12" fill="#10b981" text-anchor="middle">AI typically re-reads 5-6 files per session</text>

  <!-- Title -->
  <text x="640" y="680" font-family="system-ui" font-size="24" font-weight="600" fill="#fafafa" text-anchor="middle">Session Memory - Automatic deduplication</text>
</svg>
