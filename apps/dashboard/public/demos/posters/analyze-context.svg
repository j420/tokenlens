<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#18181b"/>

  <!-- Title -->
  <text x="640" y="60" font-family="system-ui" font-size="20" font-weight="600" fill="#fafafa" text-anchor="middle">Smart Context Analysis</text>
  <text x="640" y="85" font-family="system-ui" font-size="14" fill="#a1a1aa" text-anchor="middle">Score files by relevance to your task</text>

  <!-- Task input -->
  <rect x="200" y="120" width="880" height="50" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="230" y="152" font-family="system-ui" font-size="14" fill="#71717a">Task:</text>
  <text x="280" y="152" font-family="system-ui" font-size="14" fill="#fafafa">"fix the authentication bug in login flow"</text>

  <!-- File relevance list -->
  <rect x="100" y="200" width="500" height="420" rx="12" fill="#27272a" stroke="#3f3f46" stroke-width="2"/>
  <rect x="100" y="200" width="500" height="50" rx="12" fill="#27272a"/>
  <text x="350" y="232" font-family="system-ui" font-size="14" font-weight="600" fill="#a1a1aa" text-anchor="middle">FILE RELEVANCE SCORES</text>

  <!-- High relevance files -->
  <rect x="120" y="270" width="460" height="50" rx="8" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="140" y="300" font-family="system-ui" font-size="13" fill="#fafafa">src/auth/login.ts</text>
  <rect x="460" y="285" width="100" height="20" rx="10" fill="#10b981"/>
  <text x="510" y="299" font-family="system-ui" font-size="11" font-weight="600" fill="#fafafa" text-anchor="middle">98%</text>

  <rect x="120" y="330" width="460" height="50" rx="8" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="140" y="360" font-family="system-ui" font-size="13" fill="#fafafa">src/auth/validate.ts</text>
  <rect x="460" y="345" width="100" height="20" rx="10" fill="#10b981"/>
  <text x="510" y="359" font-family="system-ui" font-size="11" font-weight="600" fill="#fafafa" text-anchor="middle">92%</text>

  <rect x="120" y="390" width="460" height="50" rx="8" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="140" y="420" font-family="system-ui" font-size="13" fill="#fafafa">src/auth/types.ts</text>
  <rect x="460" y="405" width="100" height="20" rx="10" fill="#10b981"/>
  <text x="510" y="419" font-family="system-ui" font-size="11" font-weight="600" fill="#fafafa" text-anchor="middle">85%</text>

  <!-- Medium relevance -->
  <rect x="120" y="450" width="460" height="50" rx="8" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
  <text x="140" y="480" font-family="system-ui" font-size="13" fill="#fafafa">src/utils/crypto.ts</text>
  <rect x="460" y="465" width="100" height="20" rx="10" fill="#f59e0b"/>
  <text x="510" y="479" font-family="system-ui" font-size="11" font-weight="600" fill="#fafafa" text-anchor="middle">45%</text>

  <!-- Low relevance (crossed out) -->
  <rect x="120" y="510" width="460" height="50" rx="8" fill="#3f3f46" fill-opacity="0.5"/>
  <text x="140" y="540" font-family="system-ui" font-size="13" fill="#71717a" text-decoration="line-through">src/components/Header.tsx</text>
  <rect x="460" y="525" width="100" height="20" rx="10" fill="#71717a"/>
  <text x="510" y="539" font-family="system-ui" font-size="11" font-weight="600" fill="#fafafa" text-anchor="middle">5%</text>
  <text x="570" y="540" font-family="system-ui" font-size="11" fill="#71717a">Skip</text>

  <!-- Summary panel -->
  <rect x="680" y="200" width="500" height="420" rx="12" fill="#27272a" stroke="#10b981" stroke-width="2"/>
  <rect x="680" y="200" width="500" height="50" rx="12" fill="#10b981" fill-opacity="0.1"/>
  <text x="930" y="232" font-family="system-ui" font-size="14" font-weight="600" fill="#10b981" text-anchor="middle">OPTIMIZATION SUMMARY</text>

  <!-- Before/After comparison -->
  <rect x="710" y="280" width="200" height="120" rx="8" fill="#3f3f46"/>
  <text x="810" y="310" font-family="system-ui" font-size="12" fill="#a1a1aa" text-anchor="middle">BEFORE</text>
  <text x="810" y="345" font-family="system-ui" font-size="24" font-weight="600" fill="#ef4444" text-anchor="middle">34</text>
  <text x="810" y="370" font-family="system-ui" font-size="12" fill="#71717a" text-anchor="middle">files</text>
  <text x="810" y="390" font-family="system-ui" font-size="14" fill="#ef4444" text-anchor="middle">47,000 tokens</text>

  <rect x="950" y="280" width="200" height="120" rx="8" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1"/>
  <text x="1050" y="310" font-family="system-ui" font-size="12" fill="#10b981" text-anchor="middle">AFTER</text>
  <text x="1050" y="345" font-family="system-ui" font-size="24" font-weight="600" fill="#10b981" text-anchor="middle">4</text>
  <text x="1050" y="370" font-family="system-ui" font-size="12" fill="#10b981" text-anchor="middle">files</text>
  <text x="1050" y="390" font-family="system-ui" font-size="14" fill="#10b981" text-anchor="middle">8,500 tokens</text>

  <!-- Savings -->
  <rect x="710" y="420" width="440" height="80" rx="8" fill="#10b981" fill-opacity="0.2"/>
  <text x="930" y="455" font-family="system-ui" font-size="18" font-weight="600" fill="#10b981" text-anchor="middle">82% Token Reduction</text>
  <text x="930" y="480" font-family="system-ui" font-size="13" fill="#10b981" text-anchor="middle">38,500 tokens saved</text>

  <!-- Apply button -->
  <rect x="750" y="520" width="360" height="50" rx="8" fill="#10b981"/>
  <text x="930" y="552" font-family="system-ui" font-size="15" font-weight="500" fill="#fafafa" text-anchor="middle">Apply Recommended Context</text>

  <!-- Title -->
  <text x="640" y="680" font-family="system-ui" font-size="24" font-weight="600" fill="#fafafa" text-anchor="middle">Context Analysis - Include only what matters</text>
</svg>
